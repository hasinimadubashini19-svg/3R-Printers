<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3R Printers - Admin Dashboard</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #1e293b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .loading-spinner {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--light);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Main Container */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .dashboard.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            margin-bottom: 5px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 28px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .connection-status.connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .connection-status.disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .disconnected .status-dot {
            background: var(--danger);
        }

        .date-badge {
            background: var(--light);
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: var(--secondary);
            border: 1px solid var(--border);
        }

        .date-badge i {
            color: var(--primary);
        }

        /* Main Content */
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 25px;
            color: white;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(45deg);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .stat-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-sub {
            font-size: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Cards for different stats */
        .stat-card:nth-child(1) { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        /* Order Form */
        .form-section {
            background: var(--light);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }

        .section-title i {
            color: var(--primary);
            font-size: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
            font-size: 16px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-group input::placeholder {
            color: var(--secondary);
            opacity: 0.7;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            width: auto;
            min-width: 200px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary i {
            font-size: 18px;
        }

        /* Order List */
        .list-section {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .list-header {
            padding: 20px;
            background: var(--light);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .badge {
            background: var(--primary);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--light);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            color: var(--secondary);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover {
            background: var(--light);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-paid {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .action-btn:hover:not(:disabled) {
            background: var(--border);
            color: var(--danger);
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-primary {
                width: 100%;
            }
        }

        /* Animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card, .form-section, .list-section {
            animation: slideIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Firebase වෙත සම්බන්ධ වෙමින්...</p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-print"></i>
                </div>
                <h1>3R PRINTERS</h1>
            </div>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span id="statusText">සම්බන්ධ වෙමින්...</span>
            </div>
            <div class="date-badge">
                <i class="fas fa-calendar-alt"></i>
                <span id="currentDate"></span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-rupee-sign"></i>
                    </div>
                    <div class="stat-label">අද ආදායම</div>
                    <div class="stat-value" id="daily-total">Rs. 0</div>
                    <div class="stat-sub">
                        <i class="fas fa-arrow-up"></i>
                        <span id="dailyComparison">+0% ඊයේ සිට</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                    <div class="stat-label">මාසික ආදායම</div>
                    <div class="stat-value" id="monthly-total">Rs. 0</div>
                    <div class="stat-sub">
                        <i class="fas fa-chart-line"></i>
                        <span id="monthlyPeriod">මෙම මාසය</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <div class="stat-label">අද ඇණවුම්</div>
                    <div class="stat-value" id="today-orders">0</div>
                    <div class="stat-sub">
                        <i class="fas fa-clock"></i>
                        <span>අවසන් පැය 24</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-label">සම්පූර්ණ ගනුදෙනුකරුවන්</div>
                    <div class="stat-value" id="total-customers">0</div>
                    <div class="stat-sub">
                        <i class="fas fa-user-plus"></i>
                        <span id="newCustomers">අද +0</span>
                    </div>
                </div>
            </div>

            <!-- Order Form -->
            <div class="form-section">
                <div class="section-title">
                    <i class="fas fa-plus-circle"></i>
                    <span>අලුත් ඇණවුමක් එකතු කරන්න</span>
                </div>
                
                <div class="form-grid">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="custName" placeholder="පාරිභෝගිකයාගේ නම">
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-rupee-sign"></i>
                        <input type="number" id="amount" placeholder="මුළු මුදල (Rs.)">
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-tag"></i>
                        <select id="status">
                            <option value="Paid">සම්පූර්ණ ගෙවා ඇත (Paid)</option>
                            <option value="Pending" selected>ගෙවීමට ඇත (Pending)</option>
                        </select>
                    </div>
                </div>

                <button class="btn-primary" onclick="addOrder()" id="addOrderBtn">
                    <i class="fas fa-save"></i>
                    ඇණවුම ඇතුළත් කරන්න
                </button>
            </div>

            <!-- Order List -->
            <div class="list-section">
                <div class="list-header">
                    <h3>
                        <i class="fas fa-list"></i>
                        මෑතකාලීන ඇණවුම්
                    </h3>
                    <span class="badge" id="order-count">0</span>
                </div>

                <div class="table-container">
                    <table id="orderTable">
                        <thead>
                            <tr>
                                <th>ගනුදෙනුකරු</th>
                                <th>මුදල</th>
                                <th>තත්ත්වය</th>
                                <th>කාලය</th>
                                <th>ක්‍රියා</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody">
                            <tr class="empty-state">
                                <td colspan="5">
                                    <i class="fas fa-inbox"></i>
                                    <p>ඇණවුම් නොමැත</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA3vQpgWQS58wBO21HxuceanaLvgVLuTl4",
            authDomain: "r-printers.firebaseapp.com",
            databaseURL: "https://r-printers-default-rtdb.firebaseio.com",
            projectId: "r-printers",
            storageBucket: "r-printers.firebasestorage.app",
            messagingSenderId: "214748828845",
            appId: "1:214748828845:web:492e26a3549f92610b6224",
            measurementId: "G-GC6Z763YRJ"
        };

        // Initialize Firebase
        let database;
        let analytics;
        let app;

        try {
            app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            analytics = firebase.analytics();
            console.log("Firebase initialized successfully");
        } catch (error) {
            console.error("Firebase initialization error:", error);
            showAlert("Firebase සම්බන්ධතාවය අසාර්ථකයි!", "error");
        }

        // Global variables
        let dailyTotal = 0;
        let monthlyTotal = 0;
        let orderCount = 0;
        let customers = new Set();
        let todayOrders = 0;
        let todayCustomers = 0;

        // Check Firebase connection
        function checkConnection() {
            if (database) {
                const connectedRef = database.ref('.info/connected');
                connectedRef.on('value', (snap) => {
                    const statusDiv = document.getElementById('connectionStatus');
                    const statusText = document.getElementById('statusText');
                    
                    if (snap.val() === true) {
                        statusDiv.className = 'connection-status connected';
                        statusText.textContent = 'සම්බන්ධිතයි';
                        document.getElementById('loadingOverlay').style.display = 'none';
                        document.getElementById('dashboard').classList.add('visible');
                        loadOrders(); // Load orders when connected
                    } else {
                        statusDiv.className = 'connection-status disconnected';
                        statusText.textContent = 'සම්බන්ධ නැත';
                    }
                });
            }
        }

        // Set current date
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('si-LK', options);
        }

        // Load orders from Firebase
        function loadOrders() {
            if (!database) return;

            const ordersRef = database.ref('orders');
            ordersRef.orderByChild('timestamp').once('value', (snapshot) => {
                const orders = [];
                snapshot.forEach((childSnapshot) => {
                    orders.push({
                        id: childSnapshot.key,
                        ...childSnapshot.val()
                    });
                });

                // Clear existing table
                const tbody = document.getElementById('orderTableBody');
                tbody.innerHTML = '';

                if (orders.length === 0) {
                    tbody.innerHTML = `
                        <tr class="empty-state">
                            <td colspan="5">
                                <i class="fas fa-inbox"></i>
                                <p>ඇණවුම් නොමැත</p>
                            </td>
                        </tr>
                    `;
                    return;
                }

                // Reset counters
                dailyTotal = 0;
                monthlyTotal = 0;
                todayOrders = 0;
                customers.clear();
                todayCustomers = 0;

                const today = new Date().toDateString();
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();

                // Add orders to table (most recent first)
                orders.reverse().forEach(order => {
                    addOrderToTable(order);
                    
                    // Update statistics
                    const orderDate = new Date(order.timestamp);
                    
                    if (orderDate.toDateString() === today) {
                        if (order.status === 'Paid') {
                            dailyTotal += order.amount;
                        }
                        todayOrders++;
                    }
                    
                    if (orderDate.getMonth() === currentMonth && orderDate.getFullYear() === currentYear) {
                        if (order.status === 'Paid') {
                            monthlyTotal += order.amount;
                        }
                    }
                    
                    customers.add(order.customerName);
                });

                // Update UI
                updateStatistics();
            });
        }

        // Add order to table
        function addOrderToTable(order) {
            const tbody = document.getElementById('orderTableBody');
            
            // Remove empty state if exists
            if (tbody.children.length === 1 && tbody.children[0].classList.contains('empty-state')) {
                tbody.innerHTML = '';
            }

            const newRow = tbody.insertRow(0);
            newRow.style.animation = "slideIn 0.3s ease";
            newRow.setAttribute('data-order-id', order.id);
            
            // Format date
            const orderDate = new Date(order.timestamp);
            const formattedDate = orderDate.toLocaleString('si-LK', {
                hour: '2-digit',
                minute: '2-digit',
                day: '2-digit',
                month: '2-digit'
            });

            newRow.innerHTML = `
                <td><i class="fas fa-user-circle" style="color: var(--primary); margin-right: 5px;"></i>${order.customerName}</td>
                <td><strong>Rs. ${order.amount.toLocaleString()}</strong></td>
                <td><span class="status-badge status-${order.status.toLowerCase()}"><i class="fas ${order.status === 'Paid' ? 'fa-check-circle' : 'fa-clock'}"></i> ${order.status}</span></td>
                <td><i class="fas fa-clock" style="color: var(--secondary); margin-right: 5px;"></i>${formattedDate}</td>
                <td><button class="action-btn" onclick="deleteOrder('${order.id}')" title="මකන්න"><i class="fas fa-trash-alt"></i></button></td>
            `;
        }

        // Add new order
        function addOrder() {
            if (!database) {
                showAlert("Firebase සම්බන්ධතාවය නැත!", "error");
                return;
            }

            const name = document.getElementById('custName').value.trim();
            const amount = document.getElementById('amount').value;
            const status = document.getElementById('status').value;
            const addBtn = document.getElementById('addOrderBtn');

            // Validation
            if (name === "" || amount === "") {
                showAlert("කරුණාකර සියලු විස්තර ඇතුළත් කරන්න!", "warning");
                return;
            }

            if (parseInt(amount) <= 0) {
                showAlert("කරුණාකර වලංගු මුදලක් ඇතුළත් කරන්න!", "warning");
                return;
            }

            // Disable button
            addBtn.disabled = true;
            addBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> එකතු කරමින්...';

            // Create order object
            const order = {
                customerName: name,
                amount: parseInt(amount),
                status: status,
                timestamp: new Date().toISOString()
            };

            // Save to Firebase
            const ordersRef = database.ref('orders');
            ordersRef.push(order)
                .then(() => {
                    showAlert("ඇණවුම සාර්ථකව එකතු කරන ලදී!", "success");
                    
                    // Clear inputs
                    document.getElementById('custName').value = "";
                    document.getElementById('amount').value = "";
                    
                    // Reload orders
                    loadOrders();
                })
                .catch((error) => {
                    console.error("Error adding order:", error);
                    showAlert("ඇණවුම එකතු කිරීමට අපොහොසත් විය!", "error");
                })
                .finally(() => {
                    // Re-enable button
                    addBtn.disabled = false;
                    addBtn.innerHTML = '<i class="fas fa-save"></i> ඇණවුම ඇතුළත් කරන්න';
                });
        }

        // Delete order
        function deleteOrder(orderId) {
            if (!database) {
                showAlert("Firebase සම්බන්ධතාවය නැත!", "error");
                return;
            }

            if (!confirm("ඔබට මෙම ඇණවුම මකා දැමීමට වග බලා ගන්නවාද?")) {
                return;
            }

            const orderRef = database.ref('orders/' + orderId);
            orderRef.remove()
                .then(() => {
                    showAlert("ඇණවුම මකා දමන ලදී!", "info");
                    loadOrders(); // Reload orders
                })
                .catch((error) => {
                    console.error("Error deleting order:", error);
                    showAlert("ඇණවුම මකා දැමීමට අපොහොසත් විය!", "error");
                });
        }

        // Update statistics
        function updateStatistics() {
            document.getElementById('daily-total').innerHTML = `Rs. ${dailyTotal.toLocaleString()}`;
            document.getElementById('monthly-total').innerHTML = `Rs. ${monthlyTotal.toLocaleString()}`;
            document.getElementById('today-orders').textContent = todayOrders;
            document.getElementById('total-customers').textContent = customers.size;
            document.getElementById('order-count').textContent = customers.size;
            
            // Update comparison (mock data for now)
            document.getElementById('dailyComparison').innerHTML = `+${Math.floor(Math.random() * 20)}% ඊයේ සිට`;
            document.getElementById('newCustomers').innerHTML = `අද +${todayCustomers}`;
            
            // Update monthly period
            const monthNames = ['ජනවාරි', 'පෙබරවාරි', 'මාර්තු', 'අප්‍රේල්', 'මැයි', 'ජූනි', 'ජූලි', 'අගෝස්තු', 'සැප්තැම්බර්', 'ඔක්තෝබර්', 'නොවැම්බර්', 'දෙසැම්බර්'];
            const currentMonth = monthNames[new Date().getMonth()];
            document.getElementById('monthlyPeriod').textContent = currentMonth;
        }

        // Show alert function
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'warning' ? 'fa-exclamation-circle' : 
                        type === 'error' ? 'fa-times-circle' : 'fa-info-circle';
            
            alert.innerHTML = `
                <i class="fas ${icon}"></i>
                ${message}
            `;
            
            alert.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#10b981' : 
                            type === 'warning' ? '#f59e0b' : 
                            type === 'error' ? '#ef4444' : '#3b82f6'};
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
            `;

            document.body.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            checkConnection();
            
            // Add keyboard shortcut (Ctrl/Cmd + Enter)
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    addOrder();
                }
            });
        });
    </script>
</body>
</html>
